<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Chain</title>
<style>
  /* --- GLOBAL --- */
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Georgia', serif; }
  body { overflow:hidden; }

  /* --- COLORS & WOOD --- */
  :root {
    --main-bg: #A67B5B; /* café au lait */
    --menu-button-wood: #CBB58F;
    --game-bg: #FFDEAD; /* Navajo white */
    --slot-wood: #E0CFA0;
    --letter-tile: #D2B48C;
    --text-gold: #D4AF37;
    --text-black: #2B1B0E;
    --extra-icon-bg: #C9A66B;
    --hint-icon-bg: #BFA46A;
  }

  /* --- COMMON BUTTONS --- */
  button {
    border:none;
    border-radius:12px;
    padding:15px 30px;
    font-size:1.5rem;
    font-weight:bold;
    cursor:pointer;
    transition: transform 0.2s;
  }
  button:active { transform: scale(0.95); }

  /* --- MAIN MENU --- */
  #main-menu {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    background:var(--main-bg);
    position:relative;
  }
  #main-menu h1 {
    color: var(--text-gold);
    font-size:4rem;
    margin-bottom:50px;
  }
  #main-menu .menu-buttons {
    display:flex;
    flex-direction:column;
    gap:20px;
    margin-bottom: 100px;
  }
  #main-menu button {
    background: var(--menu-button-wood);
    color: var(--text-gold);
  }
  /* Bottom icons */
  #main-menu .bottom-icons {
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 40px;
  }
  .icon {
    background:var(--slot-wood);
    padding:15px 20px;
    border-radius:12px;
    font-weight:bold;
    font-size:1rem;
    color: var(--text-black);
  }

  /* --- GAME SCREEN --- */
  #game-screen {
    display:none;
    flex-direction:column;
    height:100vh;
    background:var(--game-bg);
    padding:20px;
    position:relative;
  }

  /* Top bar: level + coins */
  #top-bar {
    display:flex;
    justify-content:flex-end;
    gap:30px;
    font-weight:bold;
    font-size:1.2rem;
    color: var(--text-black);
    margin-bottom:20px;
  }

  /* Word slots */
  #word-slots {
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:50px;
  }
  .slot {
    background: var(--slot-wood);
    min-width:40px;
    min-height:40px;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:1.5rem;
    font-weight:bold;
    color: var(--text-black);
  }

  /* Letters circle */
  #letter-area {
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    width:100%;
    max-width:500px;
    margin:0 auto;
    position:relative;
  }
  .letter-tile {
    width:60px;
    height:60px;
    background: var(--letter-tile);
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:8px;
    font-size:1.5rem;
    font-weight:bold;
    color: var(--text-black);
    margin:10px;
    user-select:none;
    touch-action:none;
  }

  /* Extra words icon */
  #extra-icon {
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    background: var(--extra-icon-bg);
    padding:10px;
    border-radius:12px;
    font-weight:bold;
    color: var(--text-black);
  }

  /* Bottom control icons */
  #bottom-controls {
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 40px;
  }
  .control-icon {
    background: var(--hint-icon-bg);
    padding:15px;
    border-radius:12px;
    cursor:pointer;
  }

  /* Floating word feedback */
  #floating-word {
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%, -50%);
    padding:15px 25px;
    border-radius:12px;
    font-weight:bold;
    font-size:1.5rem;
    display:none;
    color:white;
    z-index:100;
  }
</style>
</head>
<body>

<!-- MAIN MENU -->
<div id="main-menu">
  <h1>WORD CHAIN</h1>
  <div class="menu-buttons">
    <button id="play-btn">PLAY</button>
    <button id="daily-btn">DAILY PUZZLES</button>
  </div>
  <div class="bottom-icons">
    <div class="icon">Level 500</div>
    <div class="icon">⚙️</div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div id="top-bar">
    <div id="level-display">Level: 1</div>
    <div id="coin-display">Coins: 0</div>
  </div>

  <div id="word-slots"></div>

  <div id="letter-area"></div>

  <div id="extra-icon">Extra</div>

  <div id="bottom-controls">
    <div id="hint-icon" class="control-icon">💡</div>
    <div id="shuffle-icon" class="control-icon">🔀</div>
  </div>

  <div id="floating-word"></div>
</div>

<script>
  // --- GAME DATA ---
  let letters = ['W','O','R','D','S'];
  let currentWord = '';
  let extraWords = [];
  let correctWords = ['WORD','SWORD','WORDS'];
  let coins = 0;
  let level = 1;

  const mainMenu = document.getElementById('main-menu');
  const gameScreen = document.getElementById('game-screen');
  const letterArea = document.getElementById('letter-area');
  const wordSlots = document.getElementById('word-slots');
  const coinDisplay = document.getElementById('coin-display');
  const levelDisplay = document.getElementById('level-display');
  const floatingWord = document.getElementById('floating-word');

  // --- MENU BUTTONS ---
  document.getElementById('play-btn').addEventListener('click', () => {
    mainMenu.style.display = 'none';
    gameScreen.style.display = 'flex';
    setupGame();
  });

  function setupGame(){
    // Display word slots (example)
    wordSlots.innerHTML = '';
    correctWords.forEach(word => {
      for(let i=0;i<word.length;i++){
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.dataset.char = word[i];
        slot.textContent = '';
        wordSlots.appendChild(slot);
      }
    });

    // Display letters
    renderLetters();
  }

  function renderLetters(){
    letterArea.innerHTML = '';
    letters.forEach(char => {
      const tile = document.createElement('div');
      tile.className = 'letter-tile';
      tile.textContent = char;
      tile.addEventListener('pointerdown', startSwipe);
      tile.addEventListener('pointerenter', continueSwipe);
      letterArea.appendChild(tile);
    });
  }

  let swiping = false;
  function startSwipe(e){
    swiping = true;
    currentWord = e.target.textContent;
    showFloatingWord(currentWord,'black');
  }

  function continueSwipe(e){
    if(swiping && e.target.classList.contains('letter-tile')){
      currentWord += e.target.textContent;
      showFloatingWord(currentWord,'black');
    }
  }

  document.addEventListener('pointerup', endSwipe);
  function endSwipe(){
    if(!swiping) return;
    swiping = false;
    checkWord(currentWord);
    currentWord = '';
    floatingWord.style.display='none';
  }

  function checkWord(word){
    if(correctWords.includes(word)){
      showFloatingWord(word,'green');
      coins += 15;
      coinDisplay.textContent = 'Coins: ' + coins;
      fillWordSlots(word);
    } else if(word.length>1){
      showFloatingWord(word,'red');
      // Optional: vibrate
    }
  }

  function showFloatingWord(word,color){
    floatingWord.textContent = word;
    floatingWord.style.background = color;
    floatingWord.style.display='block';
    setTimeout(()=>{floatingWord.style.display='none';},1000);
  }

  function fillWordSlots(word){
    let idx = 0;
    for(let slot of wordSlots.children){
      if(idx<word.length && slot.dataset.char===word[idx]){
        slot.textContent = word[idx];
      }
      idx++;
    }
  }

  // --- HINT & SHUFFLE ---
  document.getElementById('shuffle-icon').addEventListener('click',()=>{
    letters.sort(()=>Math.random()-0.5);
    renderLetters();
  });

  document.getElementById('hint-icon').addEventListener('click',()=>{
    if(coins>=60){
      coins-=60;
      coinDisplay.textContent = 'Coins: ' + coins;
      alert('Hint: '+correctWords[0][0]);
    } else alert('Not enough coins!');
  });
</script>

</body>
</html>
